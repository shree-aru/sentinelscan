version: "3.9"

services:
  api:
    build: .
    container_name: sentinelscan-api
    ports:
      - "8000:8000"
    environment:
      - SENTINEL_API_KEY=${SENTINEL_API_KEY:-sentinel-dev-key-2024}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
